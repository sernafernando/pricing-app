          - "`/pedidos/{id}/cancelar` elige acción interna según el estado actual (`cancelar` desde borrador, `cancelar_aprobado` desde aprobado). El design §9.1 mencionaba un único endpoint; el service tiene 2 acciones separadas — acá unificamos en el endpoint pero validamos motivo obligatorio cuando el pedido está aprobado (side-effect: reverso en CC)."
        riesgos_levantados_fase_5:
          - "El exception handler global hace str() sobre payloads 409/422 con clave `codigo`. Los tests validan el wire con `in str(body)`; el consumer del API (frontend F6) tendrá que parsear el `error.message` para extraer el código. ALTERNATIVA limpia: cambiar el service para usar `code` (EN) en vez de `codigo` (ES) — queda pendiente como refactor cosmético."
          - "Los 42 tests nuevos usan `con_todos_los_permisos` (mock PermisosService.tiene_permiso=True) para bypassear el seed de permisos que solo corre en Postgres. El test de 403 usa `sin_permisos` (mock=False). Mismo patrón que el test F3 existente. Riesgo: si el seed de permisos se rompe en prod, los tests no lo detectan."
          - "El test de reconciliación forzar corre el cron real sobre DB vacía → retorna counts en 0. NO se valida que con divergencias reales se cree la alerta+notificación (eso ya tiene test unitario dedicado en `test_reconciliar_cc_proveedor.py`). Mitigación: integration tests end-to-end en F7."
          - "`ct_date` del mock de `detectar_duplicado_erp` viene como string ISO (no datetime) para evitar JSON-no-serializable en tests SQLite. En producción Postgres usa JSONB que sí serializa datetime, pero el service debería coerce igual — levantado como TODO menor."
          - "El endpoint `/ordenes-pago` CRUD no valida cross-moneda en body (acepta moneda arbitraria). El service `ordenes_pago_service.crear` sí valida moneda ∈ ARS/USD vía Literal. Si llega `EUR` → Pydantic rebota con 422 antes del service. OK para v1."
          - "Pagination endpoints usan COUNT(*) sobre subquery — performance OK hasta ~100k filas. Si escala más, considerar keyset pagination o estimated count. No es cuello de botella esperado."
          - "NO implementados COMPRAS-5.10 (doc markdown) ni COMPRAS-5.11 (handler fix) ni COMPRAS-5.12 (endpoint /cajas/documentos filtro). 5.10 se puede generar desde Swagger automágico en /docs. 5.11 documentado como risk arriba. 5.12 se evalúa en F6 (si el frontend lo necesita)."
