          - "Endpoint `/sale-documents` (listado completo) solo requiere `get_current_user` (sin permiso específico). Razón: es metadata del dominio útil para poblar selects del frontend, y la info ya es pública dentro del ERP; NO considerarla sensible."
          - "Endpoint `/health` no requiere auth (smoke/readiness probe). Retorna `{status, module, services, catalogos}` con count de tb_sale_document — útil para deploy checks y para F6 verificar que el backend está listo."
          - "Reconciliación forzar: el endpoint lee las tolerancias desde la tabla `configuracion` (claves `compras.cc_reconciliacion_tolerancia_ars|_usd` sembradas por COMPRAS-1.15) usando el helper `leer_configuracion`. Si la clave falta, cae a default (100 ARS / 1 USD). NO permite override desde el body — el admin UI debe editar la clave primero."
          - "Reconciliación métricas: `dias_consecutivos_sin_divergencia` se calcula iterando día por día hacia atrás (max 60 días, corta al encontrar divergencia o día sin corrida). `cobertura_porcentaje = proveedores_reconciliados_30d / proveedores_activos_90d * 100`. Los criterios de deprecación del snapshot (R2) quedan expuestos como flags booleanos — el tercero (`aprobacion_usuarios_clave`) es manual y se setea desde admin UI en F6."
