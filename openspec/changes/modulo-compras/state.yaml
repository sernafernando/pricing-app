          - "`desimputar` recibe `motivo` como Optional (el modelo `imputaciones` no tiene columna motivo — D9 append-only). El motivo se guarda como evento del caller (op_anulada payload incluye el motivo)."
          - "match_forward se invoca en `editar_pedido` SOLO si `numero_factura` cambió y el nuevo valor es truthy. Fallo del match NO rollbackea la edición (try/except con log.exception)."
          - "Distribución FIFO v1: solo cubre pedidos aprobados/pagado_parcial del mismo proveedor+moneda. Facturas ERP vigentes quedan como TODO F4+ hasta tener columna moneda en la vista (RD6)."
          - "D13 reforzado: antes de reimputar se valida también que NO existan otros reversals apuntando a la original (sino error 400). Esto evita cadenas accidentales si alguien desimputó primero y luego quiere reimputar."
        riesgos_levantados_fase_4:
          - "ejecutar_pago hace `flush` en cada paso pero NO commitea. Depende del caller (endpoint F5) llamar `session.commit()` al final. Si el caller olvida el commit → no pasa nada (la tx no se persiste), pero es un patrón frágil. Mitigación: el endpoint debe usar `try: ... session.commit() except: session.rollback()` explicito — no delegar al Depends."
          - "Los items de OP viven como payload JSONB de un evento `items_registrados`. Si se edita OP (v2) hay que agregar un nuevo evento y `_leer_items_de_op` retorna el más reciente (LIMIT 1 ORDER BY id DESC). Riesgo: si alguien hace UPDATE directo al payload del evento (rompe append-only). Mitigación: nada a nivel DB todavía (v1); trigger BEFORE UPDATE sugerido en v2."
          - "detectar_duplicado_erp hace graceful fallback cuando la tabla no existe. En producción esto NO debería pasar (la tabla existe y tiene ~458k filas), pero si la DB se cae mid-query, la OP se crearía sin detectar duplicados reales. Mitigación: log DEBUG avisa, y el error se ve en el monitoring."
          - "`revertir_transicion_por_anulacion_op` asume que TODOS los reversals de esta OP ya están insertados antes de llamar. El loop en anular() primero desimputa TODO, después llama revertir por pedido. Si el orden se altera → estados incorrectos."
          - "Test SQLite no soporta SELECT FOR UPDATE real — en producción Postgres el lock sí funciona. Los tests pasan por semántica, pero el stress-test de concurrencia real queda para F7/integration tests."
        conflictos_prompt_vs_design_resueltos:
