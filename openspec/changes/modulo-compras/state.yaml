          - "Prompt usaba schemas de nombres inexistentes: `EtiquetaEnvioResponse`, `GenerarEtiquetaBody`, `PosibleDuplicadoResponse`. Solo el último existe en el proyecto. Para etiqueta se devolvió dict flat; para body se acepta `dict[str, Any]` y se valida inline. Para 409 se usa el dict del service (payload ya estructurado)."
