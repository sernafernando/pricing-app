        bug_fix_classifier_contraparte: "DIFERIDO a F7"  # Engram #125, no bloqueante para F3 porque la vista SQL filtra contrapartes por sí misma
        decisiones_contractuales_fase_3:
          - "Signatures del design §2.5 ajustadas: `match_forward(session, *, pedido_compra_id, usuario_id=None)` y `match_backward(session, *, cts_synced)`. El design tenía `pedido_id` nomás; usé `pedido_compra_id` por claridad y agregué `usuario_id` opcional para auditoría del evento."
          - "Hook en sync_commercial_transactions_guid.py corre DESPUÉS del commit final del sync (no antes, no en el medio). Justificación: los cts deben persistirse aunque el matching explote, y matching corre en su propio scope transaccional."
          - "cts_synced se acumula tanto en INSERT como en UPDATE (todo lo que pasa por el loop). El hook de matching decidirá qué hacer con cada uno: si no está en v_facturas_compra_vigentes se saltea silenciosamente."
          - "validar_catalogo_populado levanta RuntimeError (no HTTPException) porque NO es un endpoint: es un pre-check para un cron. El caller (hook) lo captura en su try/except."
          - "match_backward respeta el aislamiento por (comp_id, bra_id): valida que el mapeo empresa→ERP de cada pedido coincida con la ct. Sin esto, una ct de empresa=2 (bra=45) podría matchear con un pedido de empresa=1 si el supp_id y ct_docnumber coinciden."
          - "match_backward NO pisa pedidos ya matcheados: filtro `ct_transaction_id IS NULL`. El primer matcheo gana."
          - "reconciliar_diario acepta `tolerancias: dict[str, Decimal]` explícito con claves ARS/USD (cierre 2 del usuario: tolerancia por moneda). Valida que ambas claves existan — raise ValueError si faltan."
          - "_leer_snapshot_cc es el UNICO lugar con la política de mapeo snapshot→moneda. Hoy: ARS→columna pendiente, USD→None (snapshot no diferencia moneda). Cuando el ERP agregue la columna moneda al snapshot, actualizar solo esta función."
          - "Creación de alerta banner + notificaciones va en `_crear_alerta_y_notificaciones_divergencia` — si explota (ej tabla alertas caída), retorna (None, []) y el service sigue. Los logs de reconciliación NO dependen de que el sistema de notif funcione."
          - "Notificaciones: 1 por divergencia, dirigidas al primer admin activo. Más admins pueden ver todas las divergencias desde el panel admin (F6). Alternativa descartada: crear N * M_admins notif (ruido innecesario)."
          - "Endpoint /sale-documents/faltantes usa `Query(default=30, ge=1, le=365)` para dias. Rebota 422 fuera de rango — no es parte del design pero es higiene FastAPI."
