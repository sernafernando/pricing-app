        decisiones_contractuales_fase_5:
          - "Se consolidaron los 28 endpoints en UN solo router `administracion_compras.py` (en vez de splitear por recurso como sugería tasks.md COMPRAS-5.1..5.8). Razón: el usuario lo pidió explícito en el prompt F5 ('Todos los endpoints van bajo el router /api/administracion/compras que ya existe'). Simplifica imports, no fragmenta el main.py, y mantiene coherencia con el endpoint /faltantes preexistente. Tasks.md original planteaba 5 archivos separados pero era overengineering para v1."
          - "Cada endpoint que muta DB orquesta try/except/commit/rollback explícito vía `_commit_or_rollback` helper. NUNCA se delega al Depends(get_db) — el riesgo identificado en F4 (servicios que hacen flush pero no commit) se mitiga con commit manual después de cada operación exitosa."
          - "`_paginate` es un helper interno del router (no un util global). Ejecuta COUNT(*) sobre una subquery del stmt base + SELECT paginado. NO reusa uno externo porque el proyecto no tiene un paginador común estándar (cada router lo hace ad-hoc)."
          - "Pagar OP: el service lanza 422 con payload `{codigo: OP_CAJA_MONEDA_MISMATCH, mensaje: ...}`. El exception handler global (`app/core/exceptions.py`) estandariza payloads `{code, message}` (in English), y hace str() sobre dict que usan `codigo` (Spanish). En el wire el código se sigue viendo porque el str() conserva la llave, pero el envelope queda `{error:{code:'VALIDATION_ERROR', message:'...codigo=OP_CAJA_MONEDA_MISMATCH...'}}`. Los tests validan con `'OP_CAJA_MONEDA_MISMATCH' in str(body)`. El ajuste exacto del handler para respetar dicts con clave `codigo` queda diferido a COMPRAS-5.11 (gate menor) o a F7."
