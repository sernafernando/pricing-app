          - "ModalOrdenPagoNueva: la validación de `sum(items) == total` (específica) usa redondeo a 2 decimales con `Math.round(x * 100) / 100` — evita falsos negativos por floating point. Pero si en v2 se agregan montos con 3+ decimales (ej. monedas cripto) habría que ajustar. v1 cubre ARS/USD que son siempre 2 decimales."
