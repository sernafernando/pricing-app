          - "Flujo 409 POSIBLE_DUPLICADO_OP_ERP: el hook `useComprasOP.crear` NO enmascara el error (a diferencia de los otros métodos que usan wrap con setError). El caller (ModalOrdenPagoNueva) recibe el error raw y puede leer `err.response.status === 409`, extraer el payload, abrir el modal hijo de confirmación. Si el usuario cancela, el form padre mantiene TODOS los datos (UX fluida). Si confirma, reenvía POST con `confirmar_duplicado: true`."
          - "Payload 409 parser defensivo: el exception handler del backend puede envolver el payload como `{error:{code,message}}` (risk RD heredado de F5). El frontend busca `raw.codigo || raw.code || res.data?.error?.code` y fallback a string-match por 'POSIBLE_DUPLICADO_OP_ERP'. Los duplicados pueden venir como `duplicados_detectados` (contract design) o `duplicados` (si se unificara el schema). Ambos casos cubiertos."
          - "Filtro de cajas en ModalEjecutarPago: client-side filter por `caja.moneda === op.moneda` && `caja.empresa_id === op.empresa_id` para evitar el 422 OP_CAJA_MONEDA_MISMATCH antes de llegar al backend. Si el usuario elige una caja incompatible por alguna razón (edge case), el 422 se captura y mostramos mensaje claro."
          - "TC del día: se intenta `GET /tipo-cambio/actual` para el consolidado ARS estimado en CC. Si el endpoint no existe o falla, NO se bloquea la UI — simplemente muestra 'TC no disponible'. El saldo por moneda (ARS y USD por separado) sigue siendo fuente de verdad (estrategia C)."
          - "Tabs con gating individual: cada tab tiene su `tienePermiso()` y el componente raíz (AdministracionCompras) filtra `visibleTabs` antes de renderizar. Si el usuario no tiene NINGÚN permiso, se muestra emptyState. El permiso `ver_cuentas_corrientes` gate a CC Proveedores + Reconciliación; `ver_ordenes_compra` gate a Pedidos + OPs + Catálogo SD."
          - "Modales NO cierran con click en overlay — solo X button o botón Cancelar explícito (regla AGENTS.md). Si el usuario hace click en el overlay por accidente, no pierde datos."
          - "CSS Modules con CF tokens EXCLUSIVO en archivos nuevos (var(--cf-bg-app), --cf-bg-card, --cf-border-default, --cf-text-primary, --cf-accent-*). Zero hex colors, zero legacy tokens. Composes desde buttons-tesla.css para btn-tesla.* (outline-subtle-*, sm, icon-only) y de modals-tesla.css donde aplica."
          - "`.input` / `.select` / `.textarea` definidos localmente en CADA CSS module siguiendo el canonical pattern del AGENTS.md. Zero referencias a 'input-tesla' / 'select-tesla' (clases fantasmas)."
          - "Zero emojis en la UI. Todos los iconos vía lucide-react con `size` prop explícito (size={14} para acciones, size={16} para headers, size={18-24} para hero)."
          - "Error handling en TODAS las llamadas API con try/catch/finally + setLoading. Los hooks exponen `{ loading, error, ...funcs }` y los componentes muestran errorBanner inline cuando aplica (NO alert(), NO toast intrusivo)."
          - "Navegación inline entre vistas: TabPedidosCompra abre ModalPedidoCompra/ModalPedidoDetalle como overlays (no route nav). Mantiene el contexto de los filtros intacto."
        riesgos_levantados_fase_6:
          - "Proveedor ID hoy se ingresa como input numérico en los formularios (pedido + OP + CC). Debería ser un autocomplete contra `/rma-proveedores` como `ProveedorAutocomplete.jsx` existente. Se deja como TODO cosmético — v1 es funcional. Mitigación: el campo valida server-side y devuelve 404 si el ID no existe."
          - "El componente TabEnviosFlex (4085 líneas) se modificó MÍNIMAMENTE (solo el badge en la celda destinatario). Si el backend de compras no propaga `tipo_envio` al response de `/etiquetas-envio/` el badge nunca se mostrará. Verificar en integration con `GET /etiquetas-envio/` si `tipo_envio` viene en el shape. Si no viene → agregar al serializer backend como tarea menor."
          - "El endpoint `/tipo-cambio/actual` es opcional (best-effort) para el consolidado ARS. Si no existe en el proyecto, la UI cae graciosamente a 'TC no disponible'. Alternativa v2: agregar dropdown de selector de TC manual."
          - "La query de `GET /sale-documents/faltantes` corre en cada apertura del tab Catálogo SD. Es una query text sobre tb_commercial_transactions con ~458k filas (según F5). Si la ventana default de 30 días se vuelve lenta (>1s), considerar caching client-side con TTL de 10 minutos o move a background en un useEffect con polling."
