    helper: backend/app/core/compras_empresa_erp_map.py (COMPRAS-1.3)
  matching_erp:
    approach: clasificacion_semantica_por_flags   # cambió: ya no listas hardcodeadas
    catalog_source: tb_sale_document (sincronizado desde ERP, ~43 registros conocidos)
    classifier_service: backend/app/services/sale_document_classifier.py
    classifier_functions:
      - clasificar_documento_compra(sd)
      - afecta_cc_proveedor(sd)
      - signo_contable(sd)           # lee sd.sd_plusOrminus del ERP, no lo decidimos nosotros
      - es_anulacion(sd)
      - es_contraparte(sd, sd_base)
    key: "(comp_id, bra_id, supp_id, ct_docnumber)"
    strategy: DISTINCT ON por prioridad sd_id (factura vigente > anulacion/contraparte)
    vista_filtrada: v_facturas_compra_vigentes
    hook_en: backend/app/scripts/sync_commercial_transactions_guid.py
    sd_ids_conocidos_regression_test:
      facturas: [101, 104, 130, 131]
      ncs: [103, 133]
      nds: [104, 132]
      orden_pago: [106]   # OJO: riesgo R9
      remitos: [102]
      ajustes: [121, 123, 128, 129]
      ignorar: [105, 124]
      reversion_op_rechazada: [125]
      anulaciones: [151, 152, 153, 154, 156, 180]
      contrapartes: [161, 162, 163, 164, 166, 190]
  numeracion:
    formato: "{tipo}-{empresa:02d}-{año:04d}-{correlativo:05d}"
    ejemplo_p: P-01-2026-00001
    ejemplo_op: OP-01-2026-00001
    lock: SELECT FOR UPDATE en numeracion_contadores
  multi_moneda:
    estrategia: C
    descripcion: cada movimiento guarda moneda original + TC, saldo se agrupa por moneda en UI
    tc_fuente: tabla tipo_cambio existente (patrón "fecha <= X ORDER BY DESC LIMIT 1")
  imputaciones:
    unificada: true
    origen_destino_tipo: VARCHAR abiertos
    v1_origen_tipos: [orden_pago, nota_credito_erp]
    v1_destino_tipos: [pedido_compra, factura_erp, saldo]
    whitelist_combos_v1:              # Cierre post-spec: 6 combos (quitamos reimputacion, decisión append-only)
      - [orden_pago, pedido_compra]
      - [orden_pago, factura_erp]
      - [orden_pago, saldo]
      - [nota_credito_erp, pedido_compra]
      - [nota_credito_erp, factura_erp]
      - [nota_credito_erp, saldo]
    whitelist_constante: COMBOS_VALIDOS_V1 (en app/services/imputaciones_service.py)
    error_combo_invalido: "HTTP 400 - Combinación origen/destino no soportada en v1"
    reimputacion_approach: append-only      # NUEVO: decisión usuario post-spec
    reimputacion_descripcion: |
      Re-imputación = nueva fila en `imputaciones` con mismo origen_tipo que la original.
      Desimputar = imputación compensatoria (monto negativo o flag de reversal, decidir en design).
      Tabla `imputaciones` es append-only, cero UPDATE, cero DELETE.
      NO se crea un `origen_tipo='reimputacion'` como tipo propio.
  integraciones:
    cajas:
      trigger: OP marcada como pagada
      efecto: CajaMovimiento egreso + CajaDocumento con entidad_tipo='orden_pago'
    logistica:
      trigger: pedido.requiere_envio=true
      efecto: etiqueta_envio con tipo_envio='retiro_proveedor' desde proveedor.direcciones
  deprecacion_snapshot_cc:            # NUEVO: refinamiento R2
    criterios_todos_requeridos:
      - libro_mayor_propio_30_dias_sin_divergencias_en_reconciliacion_diaria
      - cobertura_minima_80_porciento_proveedores_activos
      - aprobacion_usuarios_clave_tras_revision_de_ambas_fuentes
    change_deprecacion: separado (post-v1)
  sale_document_catalog_seed:         # RENOMBRADO 2026-04-17 (antes: sale_document_catalog_sync)
    tabla: tb_sale_document
    approach: seed estático Alembic
    fuente_datos: Engram obs #106 (sd_id 1-80 ventas + sd_id 101-500 compras/bancos — ~43 registros)
    migracion_seed: backend/alembic/versions/compras_NNNN_seed_tb_sale_document.py (ver COMPRAS-1.2b en tasks.md)
    upsert_key: sd_id (PK manual, no autogenerado)
    panel_admin: UI read-only + listado de sd_id faltantes (sin botón sync)
    extension_futura: vía nueva Alembic migration cuando GBP agregue tipos nuevos (no hay sync automático)
    razon: |
      La tabla del ERP cambia 1-2 veces por año (tipos de documento nuevos).
      No justifica cron ni script de sync. Decisión usuario post-design
      (2026-04-17, Engram obs #121).
    engram_ref: "#121 (decision sdd/modulo-compras/sale-document-no-sync)"
  anti_doble_contabilizacion:          # NUEVO: cierre Obs 3 post-spec
    contexto: R9 + sd_id=106 en ERP puede duplicar pago si usuario carga OP en ambos lados
    componentes:
      banner_ui:
        tipo: dismissable_por_sesion
        storage: sessionStorage (no localStorage)
        reaparece: 1x/dia por usuario (al nuevo login/tab)
        texto: "Si este pago ya se registró directamente en el ERP, NO lo cargues aquí. Se contabilizaría dos veces."
        ubicacion: pantalla de crear OP, arriba del form
      http_409_deteccion:
        trigger: POST /api/administracion/compras/ordenes-pago (create)
        validacion: |
          Antes de crear la OP busca en tb_commercial_transactions:
          - supp_id = proveedor de la OP
          - sd_id = 106 (Orden de Pago ERP)
          - ct_docnumber coincide con alguno de los numeros_factura imputados
          - ct_date en últimos 7 días
          - NOT ct_iscancelled
        respuesta_si_match:
          status: 409 Conflict
          codigo: POSIBLE_DUPLICADO_OP_ERP
          payload:
            mensaje: "Detectamos una OP en el ERP para esta factura..."
            duplicados_detectados: [{ct_transaction, ct_date, ct_total}]
        confirmacion_usuario:
          flag: confirmar_duplicado=true (en el body del retry)
          efecto: backend salta validación y crea igual
          auditoria: registrar evento 'op_creada_con_duplicado_confirmado' en pedido_compra_eventos (o tabla eventos OP)

