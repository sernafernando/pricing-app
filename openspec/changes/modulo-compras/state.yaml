        decisiones_contractuales_fase_2:
          - "Enum: se usa `ClasificacionDocCompra` (design §2.1) con MAYÚSCULAS (FACTURA, NC, ND, ...) en lugar del `TipoDocumentoCompra` con minúsculas del prompt (conflicto prompt vs design → se siguió design). Se agregó `UNKNOWN` como último valor para detectar regresión."
          - "signature de generar_siguiente_numero retorna `tuple[str, int]` (design §2.6) en lugar de solo `str` (prompt). Útil para auditoría y para callers que necesiten el entero sin re-parsear."
          - "`es_contraparte`: design §2.1 define `es_contraparte(sd, sd_base)` como predicado binario. El prompt pidió `es_contraparte(sd, session)` con lookup en DB. Se implementaron AMBAS: `es_contraparte_de(sd, sd_base)` (binario) y `es_contraparte(sd, session)` (con convenio sd_id mayor gana, alineado con v_facturas_compra_vigentes)."
          - "`calcular_saldo_por_moneda`: devuelve SOLO monedas con movimientos en la ventana (el prompt y el design coinciden en esta parte). No devuelve ARS=0 si el proveedor nunca tuvo ARS."
          - "`insertar_mov` resuelve TC desde `tipo_cambio` con patrón estándar `fecha <= X ORDER BY fecha DESC LIMIT 1`. Si no hay TC previo para USD → guarda `None` con log WARNING (no bloquea)."
          - "`monto_imputado_total_al_destino` excluye imputaciones con es_reversal=True (los reversals no 'deshacen' a nivel sumatoria de imputaciones; la compensación se refleja en el libro mayor CC, no acá)."
          - "`crear_imputacion` es AT-OMICA respecto de side-effects: NO invoca cc_proveedor_service. El caller (F4) orquesta la tx completa (flujo OP / NC)."
        riesgos_levantados_fase_2:
          - "CRITICO (mitigado): SQLite en tests NO autogenera IDs BigInteger PK. Se parchó conftest._patch_pg_types_for_sqlite para downgrade BigInteger PK → Integer en SQLite. Producción usa Postgres donde BigInteger SI autoincrementa. Revisar si aparecen otros tests nuevos con BigInteger PK que fallen por el mismo motivo (ya cubierto por el parche generalizado)."
          - "Test de concurrencia de numeración (10 threads) valida 'sin duplicados' emulando el lock pesimista con `threading.Lock` de Python — SQLite no soporta SELECT FOR UPDATE real. El test queda documentado como validación del servicio DADO el lock; validación real de `FOR UPDATE` requiere Postgres (dejar pendiente como integration test en F7/COMPRAS-7.2)."
          - "sd_id AMBIGUOS (13 valores, Engram #124): el clasificador emite WARNING cuando los procesa. No altera el resultado. Seguimiento reactivo cuando aparezcan en datos reales."
          - "`es_contraparte(sd, session)` usa convenio 'sd_id mayor gana' (consistente con v_facturas_compra_vigentes del design §4.1). Si alguna vez aparecen pares de contraparte con sd_id menor como 'ganador', la heurística falla — mitigación: RD3 ya documentado en design."
        conflictos_prompt_vs_design_resueltos:
          - "Enum name/case: prompt dice `TipoDocumentoCompra` en minúsculas; design dice `ClasificacionDocCompra` en MAYÚSCULAS → se siguió el design (contrato técnico)."
          - "Return type de numeracion: prompt dice `str`; design dice `tuple[str, int]` → se siguió el design."
          - "`es_contraparte` signature: prompt pasa `session`, design pasa `sd_base` → se implementaron ambas con nombres distintos (`es_contraparte_de` para binario, `es_contraparte` para lookup)."
